# Based heavily on the docker build action from immich (https://github.com/immich-app/immich/)

name: Build CI and Release

permissions:
  contents: write

on:
  push:
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pio:
    name: Build PlatformIO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.13'
      - name: Install python
        run: sudo apt-get install python3 python3-pip
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or any recent LTS version

      - name: Install html-minifier-terser
        run: npm install html-minifier-terser

      - name: Build PlatformIO Project
        run: pio run --environment os3x_esp8266

      - name: Move and rename firmware
        run: |
          TAG_NAME=${GITHUB_REF_NAME:-untagged}
          mv .pio/build/os3x_esp8266/firmware.bin ./firmware_os_esp8266-${TAG_NAME}.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./firmware_os_esp8266-${{ github.ref_name }}.bin
  
  release-pio:
    name: Release PlatformIO
    runs-on: ubuntu-latest
    needs: [build-pio]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: ./firmware

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ github.token }}
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "PlatformIO firmware build for tag ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload firmware asset
        uses: actions/upload-release-asset@v1
        with:
          repo_token: ${{ github.token }}
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./firmware/firmware_os_esp8266-${{ github.ref_name }}.bin
          asset_name: firmware_os_esp8266-${{ github.ref_name }}.bin
          asset_content_type: application/octet-stream
